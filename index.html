<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="makeGTD — tu sistema GTD completo, simple y sin distracciones." />
  <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
  <title>makeGTD</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-stone-50 text-stone-800 dark:bg-stone-950 dark:text-stone-200 antialiased">
  <div id="app" class="min-h-screen md:flex">
    <!-- Desktop sidebar navigation (rendered by app.js) -->
    <aside
      id="sidebar"
      class="hidden md:flex md:flex-col md:w-60 md:shrink-0 md:h-screen md:sticky md:top-0 border-r border-stone-200 dark:border-stone-800 px-3 py-6"
    ></aside>

    <main class="flex-1 min-w-0">
      <div id="view" class="max-w-2xl mx-auto px-4 pt-6 pb-32 md:pb-16"></div>
    </main>

    <!-- Mobile bottom navigation (rendered by app.js) -->
    <nav
      id="bottom-nav"
      class="md:hidden fixed bottom-0 inset-x-0 z-40 bg-stone-50/95 dark:bg-stone-950/95 backdrop-blur border-t border-stone-200 dark:border-stone-800"
      style="padding-bottom: env(safe-area-inset-bottom)"
    ></nav>

    <!-- Global quick capture -->
    <button
      id="capture-fab"
      type="button"
      aria-label="Capturar idea"
      class="fixed z-30 bottom-20 right-4 md:bottom-8 md:right-8 w-14 h-14 rounded-full bg-accent text-white text-3xl leading-none flex items-center justify-center transition-transform duration-150 active:scale-95 hover:bg-accent-dark"
    >+</button>

    <div id="capture-overlay" class="fixed inset-0 z-50 hidden bg-stone-900/40 dark:bg-black/60" aria-hidden="true">
      <div class="max-w-lg mx-auto mt-[18vh] px-4">
        <form id="capture-form" class="bg-white dark:bg-stone-900 rounded-2xl p-4 border border-stone-200 dark:border-stone-700">
          <label for="capture-input" class="block text-sm text-stone-500 dark:text-stone-400 mb-2">
            ¿Qué tienes en la cabeza?
          </label>
          <input
            id="capture-input"
            type="text"
            autocomplete="off"
            placeholder="Escríbelo y suéltalo…"
            class="w-full text-lg bg-transparent outline-none placeholder-stone-400 dark:placeholder-stone-500"
          />
          <div class="flex items-center justify-between mt-4">
            <span class="text-xs text-stone-400 dark:text-stone-500">Enter para guardar · Esc para cerrar</span>
            <button type="submit" class="min-h-[44px] px-5 rounded-xl bg-accent text-white font-medium hover:bg-accent-dark transition-colors duration-150">
              Capturar
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Transient confirmation toast -->
    <div
      id="toast"
      class="fixed z-50 bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-stone-800 text-stone-50 dark:bg-stone-100 dark:text-stone-900 text-sm hidden pointer-events-none"
      role="status"
      aria-live="polite"
    ></div>
  </div>

  <script src="js/vendor/jquery.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/model.js"></script>
  <script src="js/views.js"></script>
  <script src="js/process.js"></script>
  <script src="js/review.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
